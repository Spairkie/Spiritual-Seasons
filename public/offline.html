<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Spiritual Seasons</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #faf8f3; color: #2d2417; }
    body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 2rem; box-sizing: border-box; }
    .wrap { text-align: center; max-width: 340px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #7a6a55; line-height: 1.6; margin-bottom: 1.5rem; }
    button { padding: 0.75rem 2rem; background: #6b5c3e; color: white; border: none; border-radius: 9999px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4a3d28; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🌿</div>
    <h1>You're offline</h1>
    <p>Your devotional journey continues, but it looks like you've lost your connection. Your journal and progress are safe on your device.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
